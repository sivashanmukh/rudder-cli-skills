# RudderTyper Configuration
#
# This file configures code generation from your tracking plan.
# Run `rudder-cli typer init` to generate this file with your actual IDs.

version: "1.0.0"

trackingPlan:
  id: "tp_abc123"              # Replace with your tracking plan ID
  workspace: "ws_xyz789"       # Replace with your workspace ID

# Language: "kotlin" for Android, "swift" for iOS
language: kotlin

output:
  path: ./generated-kotlin     # Output directory for generated code

# Optional: customize naming conventions
# naming:
#   eventPrefix: ""            # Prefix for event method names
#   eventSuffix: ""            # Suffix for event method names

# Optional: filter which events to generate
# events:
#   include:                   # Only generate these events
#     - "Product Viewed"
#     - "Product Added to Cart"
#     - "Order Completed"
#   # OR
#   exclude:                   # Skip these events
#     - "Internal Debug Event"
